<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Theme Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Fontawesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-dark text-white">

    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary py-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><img src="./public/assets/images/logo.png" alt="FurnitureStore"
                    width="40" height="40" class="d-inline-block  me-2">Furniture<span
                    style="color: #dd7210;">Store</span> </a>
            <div class="d-flex gap-3 ">
                <div class="d-flex gap-3 justify-content-around align-items-center">
                    <a href="#" class="text-white"><i class="fa-solid fa-magnifying-glass fs-5"></i></a>
                    <a href="#" class="text-white"><i class="fa-regular fa-user fs-5"></i></a>
                    <a href="#" class="text-white"><i class="fa-solid fa-cart-arrow-down fs-5"></i></a>
                </div>
                <button class="btn text-white btn-outline-light " type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#furnitureSidebar">
                    <i class="fa-solid fa-bars"></i> </button>
            </div>




        </div>
    </nav>

    <div class="offcanvas offcanvas-end bg-black text-white" tabindex="-1" id="furnitureSidebar">
        <div class="offcanvas-header border-bottom border-secondary">
            <h5 class="offcanvas-title fw-bold">Navigation Menu</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <ul class="navbar-nav fs-5">
                <li class="nav-item mb-2"><a class="nav-link text-white" href="#">Home</a></li>
                <li class="nav-item mb-2"><a class="nav-link text-white" href="#">Shop Furniture</a></li>
                <li class="nav-item mb-2"><a class="nav-link text-white" href="#">Your Cart 🛒</a></li>
            </ul>
        </div>
    </div>

    <div class="container text-center mt-5">
        <h1>Welcome to Premium Furniture Store</h1>
        <p class="text-white">Click the top-right "Menu" button to test the sidebar.</p>
        <div id="carouselExampleControls" class="carousel slide" data-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img class="d-block w-100" src="./public/assets/images/slider-image1.jpg" alt="First slide">
                </div>
                <div class="carousel-item">
                    <img class="d-block w-100" src="./public/assets/images/slider-image2.jpg" alt="First slide">
                </div>
                <div class="carousel-item">
                    <img class="d-block w-100" src="./public/assets/images/slider-image3.jpg" alt="First slide">
                </div>
            </div>
            <a class="carousel-control-prev" href="#carouselExampleControls" role="button" data-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            </a>
            <a class="carousel-control-next" href="#carouselExampleControls" role="button" data-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
